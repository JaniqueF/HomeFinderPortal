<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HomeFinder Portal</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!--USER LOGIN (FRs-6&7)-->
    <div class="loginBox" id="loginBox">
      <h2>HomeFinder Login</h2>

      <form>
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button id="loginButton">Login</button>
      </form>
      <div id="message"></div>
      <div class="registerLink">
        <p>
          Don't have an account?
          <a href="#" id="showSignUp">Signup now</a>
        </p>
      </div>
    </div>

    <!--REGISTRATION (FR-1&2)-->
    <div class="signUpBox" id="signUpBox">
      <h2>HomeFinder Registration</h2>
      <input type="text" id="fullName" placeholder="Full Name" required />
      <input type="email" id="signUpEmail" placeholder="Email" required />
      <input
        type="password"
        id="signUpPassword"
        placeholder="Password"
        required
      />
      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required
      />
      <div id="signUpMessage"></div>
      <button id="createAccount">Create Account</button>
      <button id="backToLogin">Back to Login</button>
    </div>

    <!--TOKEN VERIFCATION (FR-8)-->
    <div id="tokenBox">
      <h3>Email Verification</h3>
      <p>Enter token sent to your email:</p>
      <input id="tokenInput" type="text" placeholder="Token" required />
      <button id="verifyToken">Verify</button>
      <div id="tokenMessage"></div>
    </div>

    <!--DISPLAY DASHBOARD IF SUCCESSFUL-->
    <div id="dashboard">
      <h1>HomeFinder Portal</h1>
      <h2>Welcome, User!</h2>
      <button id="logOutButton">Logout</button>

      <!--ADMIN ADD PROPERTY (FR-26)-->
      <div id="adminAccess">
        <h3>Add Property</h3>
        <input type="text" id="propertyName" placeholder="Property Name" />
        <select id="propertyType">
          <option value="">Select Property Type</option>
          <option value="Residential">Residential</option>
          <option value="Commercial">Commercial</option>
          <option value="Rental">Rental</option>
        </select>
        <input type="text" id="propertyAddress" placeholder="Address" />
        <input type="number" id="propertyPrice" placeholder="Price" />
        <textarea id="propertyDescription" placeholder="Description"></textarea>
        <select id="propertyStatus">
          <option value="Available">Available</option>
          <option value="Sold">Sold</option>
          <option value="Rented">Rented</option>
        </select>

        <button id="addPropertyButton">Save Property</button>
        <p id="propertyMessage"></p>
      </div>

      <!-- SEARCH/BROWSE PROPERTIES (FR-10) -->
      <h3>Browse Properties</h3>
      <div class="searchBox" id="searchBox">
        <input type="text" placeholder="Search property listings..." />
        <button id="searchButton">Search</button>

        <!-- Add Properties (FR-26) -->
        <div class="propertyList" id="propertyList"></div>

        <!-- SUBMIT INQUIRIES (FR-20) -->
        <div class="inquiryMessage" id="inquirySection">
          <h3>Submit Inquiry</h3>
          <input type="text" id="inquiryProperty" placeholder="Property Name" />
          <textarea
            id="inquiryMessage"
            placeholder="Enter your inquiry..."
          ></textarea>
          <button id="inquiryButton">Submit Inquiry</button>
          <div id="inquiryResult"></div>
        </div>
      </div>
    </div>

    <script src="homeFinderDB.js"></script>
    <script src="portal.js"></script>
  </body>
</html>
